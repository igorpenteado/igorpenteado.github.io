<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Cadastro</title>
</head>
<body>

	<a href="index.html">Início</a>

	|

	<a href="nossa_localização.html">Nossa Localização</a>

	|

	<a href="opniao.html">Nos Diga sua Opnião</a>

	<hr>

	<form>

		<fieldset>

			<legend><big><i><b>Login</b></i></big></legend>

			<label for="nomeUser">Nome de Usuário:</label><br>
			<input type="text" name="nomeUser" id="nomeUser" size="40" required>

			<br><br>

			<label for="Email">Email:</label><br>
			<input type="email" id="Email" name="Email" size="10" minlength="8" maxlength="50" required>

			<br><br>

			<label for="senha">Senha:</label><br>
			<input type="password" id="senha" name="senha" required minlength="8" size="10">

			<br><br>

			<label for="senhaConfirmar">Confirmar senha:</label><br>
			<input type="password" id="senhaConfirmar" name="senhaConfirmar" required minlength="8" size="10">

			<br><br>

			<label for="idade">Idade</label><br>
			<input type="number" id="idade" name="idade" min="18" max="120" required>

			<br><br>
			<label for="FotoPerfil">Foto de Perfil:</label><br>
			<input type="file" id="FotoPerfil" name="FotoPerfil" accept="image, .png">

			<br><br>
			<label for="Gênero">Gênero:</label><br>
			Feminino<input type="radio" name="Gênero" value="Feminino">
			Masculino<input type="radio" name="Gênero" value="Masculino">

		</fieldset>

		<fieldset>

			<legend><big><i><b>Dados</b></i></big></legend>

			<label for="nomeComp">Nome Completo:</label><br>
			<input type="text" name="nomeComp" id="nomeComp" size="40" required>

			<br><br>

			<label for="CPF">CPF:</label><br>
			<input type="text" name="CPF" id="CPF" size="11" required>

			<br><br>

			<label for="CEP">CEP:</label><br>
			<input type="text" name="CEP" id="CEP" size="8" required>

			<br><br>

			<label for="idioma">Idioma:</label><br>
			<input type="text" name="idioma" id="idioma" size="40" required>

		</fieldset>

		<br><br>
		
		<input type="submit" value="Cadastrar">

	</form>


</body>
</html>
